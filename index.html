<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>바카라 2매 분석기</title>

<link rel="manifest" href="manifest.json">

<style>

body {
  font-family: Arial;
  padding: 20px;
}

button {
  font-size: 25px;
  margin: 5px;
  padding: 15px 25px;
}

table {
  border-collapse: collapse;
  margin-top: 20px;
}

td {
  width: 50px;
  height: 50px;
  text-align: center;
  border: 1px solid black;
  font-weight: bold;
}


/* 출목 2줄 */
.playerCell {
  background-color: #6D9DC5;
  color: white;
  font-size: 28px;
  font-weight: bold;
}

.bankerCell {
  background-color: #D96C6C;
  color: white;
  font-size: 28px;
  font-weight: bold;
}


/* 3번째 / 5번째 줄 */
.smallCell {
  font-size: 18px;
}

/* 4번째 줄 (예측줄) */
.predictCell {
  background-color: #FFD8A8;
  font-size: 28px;
  font-weight: bold;
}

/* 5번째 줄 (실제 결과) */
.resultCell {
  background-color: white;
  font-size: 28px;
  font-weight: bold;
}

</style>

</head>

<body>

<h2>바카라 2매 분석기</h2>

<button onclick="add('1')">플 (1)</button>

<button onclick="add('0')">뱅 (0)</button>

<button onclick="addTie()">타이 +</button>

<button onclick="removeTie()">타이 -</button>

<button onclick="undo()">삭제</button>

<button onclick="clearAll()">전체삭제</button>

<h3 id="count"></h3>

<div id="board"></div>

<script>

let data = [];

let tieCount = 0;


// 플 / 뱅 입력
function add(value) {

  data.push(value);

  render();
}


// 타이 증가
function addTie() {

  tieCount++;

  render();
}


// 타이 감소
function removeTie() {

  if (tieCount > 0) {

    tieCount--;

  }

  render();
}


// 마지막 삭제
function undo() {

  data.pop();

  render();
}


// 전체삭제
function clearAll() {

  data = [];

  tieCount = 0;

  render();
}


// 화면 출력
function render() {

  let html = "<table>";

  let row0 = "<tr>";
  let row1 = "<tr>";
  let row2 = "<tr>";
  let row3 = "<tr>";
  let row4 = "<tr>";
  let row5 = "<tr>";

  let compareResults = [];
  let compareResults2 = [];


  // 2매 생성 + 3번째 줄 생성
  for (let i = 0; i < data.length; i += 2) {

    let first = data[i] || "";
    let second = data[i + 1] || "";

let class1 = "";
if (first == "1") class1 = "playerCell";
else if (first == "0") class1 = "bankerCell";

let class2 = "";
if (second == "1") class2 = "playerCell";
else if (second == "0") class2 = "bankerCell";

row1 += "<td class='" + class1 + "'>" + first + "</td>";
row2 += "<td class='" + class2 + "'>" + second + "</td>";

    if(i===0){ row0 += "<td></td>"; }
    row0 += "<td class='smallCell'>" + (i/2+1) + "</td>";

    let result = "";


    // 3번째 줄
    if (first !== "" && second !== "") {

      if (first === second) {

        result = "1";

      } else {

        result = "0";

      }

      compareResults.push(result);
    }

    row3 += "<td class='smallCell'>" + result + "</td>";
  }


  // 4번째 줄 생성
  for (let i = 0; i < compareResults.length; i++) {

    let result = "";

    if (i >= 1) {

      if (compareResults[i] === compareResults[i - 1]) {

        result = "1";

      } else {

        result = "0";

      }

      compareResults2.push(result);
    }

let bg = "";

if (i >= 4) {

    let pos = (i - 4) % 6;

    if (pos < 3) {
        bg = " style='background:#E5E5E5'";
    }

}

row4 += "<td class='resultCell'" + bg + ">" + result + "</td>";


  }

  // 5번째 줄 생성

  row5 += "<td></td>";
  row5 += "<td></td>";

  for (let i = 0; i < compareResults2.length; i++) {

    row5 +=
      "<td class='predictCell'>"
      + compareResults2[i] +
      "</td>";
  }


  row0 += "</tr>";
  row1 += "</tr>";
  row2 += "</tr>";
  row3 += "</tr>";
  row4 += "</tr>";
  row5 += "</tr>";


html += row0;
html += row1;
html += row2;
html += row5;   // 예측줄 먼저
html += row4;   // 실제 결과 나중

  html += "</table>";

  document.getElementById("board").innerHTML = html;


  // 출목 정보 표시
  document.getElementById("count").innerText =

    "플/뱅 : " + data.length +

    "   |   타이 : " + tieCount +

    "   |   총 출목 : " + (data.length + tieCount);
}


// PWA 등록
if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>

</html>
